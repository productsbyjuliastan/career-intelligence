<!DOCTYPE html>
<html lang="en">
<head>

  <title>OnCourse - Target Career</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

    <button class="exit-btn">Exit</button>

      <h1>What target career are you considering?</h1>
      <form id="target-form">

        <div class="nav-actions">
          <button type="button" class="secondary-btn" onclick="window.location.href='/interests.html'">Back</button>
          <button type="submit" class="primary-btn">Analyze</button>
        </div>
      </form>
    </section>
  </main>

  <script src="/js/state.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/target.js"></script>
</body>
</html>
